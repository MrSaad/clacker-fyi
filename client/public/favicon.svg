      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;display=swap');
      text {
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        font-size: 72px;
        font-weight: 600;
        fill: #073642;
      }
    </style>
  </defs>
  
  <!-- Shadow/Bottom edge -->
